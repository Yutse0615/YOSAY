<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>股票總覽</title>
    
    <!-- 🍎 iOS 桌面 App 專屬設定 -->
    <meta name="apple-mobile-web-app-title" content="股票總攬">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 依據系統設定自動切換深淺色
        tailwind.config = {
            darkMode: 'media', 
        }
    </script>
    
    <!-- 引入 Chart.js 與 DataLabels 外掛 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .text-profit { color: #ef4444; font-weight: 600; } 
        .text-loss { color: #22c55e; font-weight: 600; }   
        /* 深色模式下的盈虧顏色微調 */
        @media (prefers-color-scheme: dark) {
            .text-profit { color: #f87171; }
            .text-loss { color: #4ade80; }
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800 bg-gray-100 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 relative">

    <!-- 提示訊息框 (Toast) -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 dark:bg-gray-200 dark:text-gray-900 text-white px-6 py-3 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>

    <h1 class="text-3xl font-bold text-center mb-8 text-slate-700 dark:text-slate-200">📊 股票總攬</h1>

    <!-- 1. 四個無外框環形圖區域 -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center transition-colors">
            <h3 class="text-lg font-semibold text-gray-600 dark:text-gray-300 mb-2">股票國家比例</h3>
            <div class="relative w-full h-64"><canvas id="chartCountry"></canvas></div>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">根據庫存現值加總</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center transition-colors">
            <h3 class="text-lg font-semibold text-gray-600 dark:text-gray-300 mb-2">股票債券比例</h3>
            <div class="relative w-full h-64"><canvas id="chartAssetType"></canvas></div>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">根據庫存現值加總</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center transition-colors">
            <h3 class="text-lg font-semibold text-gray-600 dark:text-gray-300 mb-2">浮動盈虧 (按券商)</h3>
            <div class="relative w-full h-64"><canvas id="chartUnrealized"></canvas></div>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">庫存未實現損益</p>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col items-center transition-colors">
            <h3 class="text-lg font-semibold text-gray-600 dark:text-gray-300 mb-2">已實現損益 (按券商)</h3>
            <div class="relative w-full h-64"><canvas id="chartRealized"></canvas></div>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">歷史賣出損益</p>
        </div>
    </div>

    <!-- 2. 表單輸入區域 (RWD 響應式優化，符合手機比例) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        
        <!-- 買入紀錄表單 -->
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-blue-100 dark:border-blue-900 border-t-4 border-t-blue-500 transition-colors">
            <h2 class="text-xl font-bold mb-4 flex items-center dark:text-gray-200"><span class="text-blue-500 mr-2">➕</span> 新增買入 / 庫存紀錄</h2>
            <form id="buyForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">券商名稱</label>
                    <select id="buyBroker" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white broker-dropdown" required></select>
                </div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">買入標的</label><input type="text" id="buySymbol" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">買入日期</label><input type="date" id="buyDate" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">股票國家</label>
                    <select id="buyCountry" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                        <option value="台股">台股</option><option value="美股">美股</option><option value="日股">日股</option><option value="韓股">韓股</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">股票類型</label>
                    <select id="buyType" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                        <option value="股票">股票</option><option value="債券">債券</option><option value="高股息">高股息</option><option value="etf">etf</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">買入股數</label><input type="number" id="buyShares" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">成交價 (買價)</label><input type="number" step="0.01" id="buyPrice" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div class="col-span-1 sm:col-span-2 mt-2">
                    <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition">新增庫存</button>
                </div>
            </form>
        </div>

        <!-- 賣出紀錄表單 -->
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-emerald-100 dark:border-emerald-900 border-t-4 border-t-emerald-500 transition-colors">
            <h2 class="text-xl font-bold mb-4 flex items-center dark:text-gray-200"><span class="text-emerald-500 mr-2">➖</span> 新增賣出 / 已實現紀錄</h2>
            <form id="sellForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                
                <div class="col-span-1 sm:col-span-2 bg-gray-50 dark:bg-gray-700 p-3 rounded border dark:border-gray-600">
                    <label class="block text-sm font-medium mb-1 text-gray-600 dark:text-gray-300">代入庫存買入成本 (可選，將自動扣除股數)</label>
                    <select id="sellLinkBuy" class="w-full border dark:border-gray-500 rounded p-2 mb-2 bg-white dark:bg-gray-600 dark:text-white">
                        <option value="">-- 不代入，手動填寫買入總金額 --</option>
                    </select>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">買入總金額 (成本)</label>
                    <input type="number" step="0.01" id="sellBuyTotal" class="w-full border dark:border-gray-500 rounded p-2 bg-white dark:bg-gray-600 dark:text-white" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">券商名稱</label>
                    <select id="sellBroker" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white broker-dropdown" required></select>
                </div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">賣出標的</label><input type="text" id="sellSymbol" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">賣出日期</label><input type="date" id="sellDate" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">股票國家</label>
                    <select id="sellCountry" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                        <option value="台股">台股</option><option value="美股">美股</option><option value="日股">日股</option><option value="韓股">韓股</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">股票類型</label>
                    <select id="sellType" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                        <option value="股票">股票</option><option value="債券">債券</option><option value="高股息">高股息</option><option value="etf">etf</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">賣出股數</label><input type="number" id="sellShares" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">賣出成交價</label><input type="number" step="0.01" id="sellPrice" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>

                <div class="col-span-1 sm:col-span-2 mt-2">
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded transition">新增已實現紀錄</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 3. 表格展示區域 -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 mb-8 overflow-x-auto transition-colors">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-xl font-bold text-slate-700 dark:text-slate-200">📦 庫存明細 (未實現)</h2>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <label class="text-sm font-bold text-gray-600 dark:text-gray-300">排序：</label>
                    <select id="sortBuySelect" class="border dark:border-gray-600 rounded p-1 text-sm bg-gray-50 dark:bg-gray-700 dark:text-white outline-none cursor-pointer">
                        <option value="default">預設 (新增順序)</option>
                        <option value="broker">券商分類</option>
                        <option value="date">買進日期 (新到舊)</option>
                        <option value="country">股票國家</option>
                        <option value="type">股票類型</option>
                    </select>
                </div>
                <button id="refreshPricesBtn" class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold py-2 px-4 rounded shadow transition flex items-center">
                    🔄 最新報價
                </button>
            </div>
        </div>
        <table class="w-full text-left border-collapse min-w-[800px]">
            <thead>
                <tr class="bg-slate-50 dark:bg-gray-700 border-b-2 border-slate-200 dark:border-gray-600">
                    <th class="p-3 dark:text-gray-200">券商</th><th class="p-3 dark:text-gray-200">標的</th><th class="p-3 dark:text-gray-200">國家</th><th class="p-3 dark:text-gray-200">類型</th>
                    <th class="p-3 dark:text-gray-200">買入日期</th><th class="p-3 text-right dark:text-gray-200">股數</th><th class="p-3 text-right dark:text-gray-200">買價</th>
                    <th class="p-3 text-right dark:text-gray-200">買入總額</th><th class="p-3 text-right dark:text-gray-200">現價 (可修改)</th><th class="p-3 text-right dark:text-gray-200">浮動盈虧</th><th class="p-3 text-center dark:text-gray-200">操作</th>
                </tr>
            </thead>
            <tbody id="buyTableBody" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
        </table>
    </div>

    <!-- 4. 歷史交易表格 -->
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-x-auto transition-colors">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-xl font-bold text-slate-700 dark:text-slate-200">💰 歷史交易 (已實現)</h2>
            <div class="flex items-center gap-2">
                <label class="text-sm font-bold text-gray-600 dark:text-gray-300">排序：</label>
                <select id="sortSellSelect" class="border dark:border-gray-600 rounded p-1 text-sm bg-gray-50 dark:bg-gray-700 dark:text-white outline-none cursor-pointer">
                    <option value="default">預設 (新增順序)</option>
                    <option value="broker">券商分類</option>
                    <option value="date">賣出日期 (新到舊)</option>
                    <option value="country">股票國家</option>
                    <option value="type">股票類型</option>
                </select>
            </div>
        </div>
        <table class="w-full text-left border-collapse min-w-[800px]">
            <thead>
                <tr class="bg-slate-50 dark:bg-gray-700 border-b-2 border-slate-200 dark:border-gray-600">
                    <th class="p-3 dark:text-gray-200">券商</th><th class="p-3 dark:text-gray-200">標的</th><th class="p-3 dark:text-gray-200">國家</th><th class="p-3 dark:text-gray-200">類型</th>
                    <th class="p-3 dark:text-gray-200">賣出日期</th><th class="p-3 text-right dark:text-gray-200">股數</th><th class="p-3 text-right dark:text-gray-200">賣價</th>
                    <th class="p-3 text-right dark:text-gray-200">賣出總額</th><th class="p-3 text-right dark:text-gray-200">買入成本</th><th class="p-3 text-right dark:text-gray-200">已實現損益</th><th class="p-3 text-center dark:text-gray-200">操作</th>
                </tr>
            </thead>
            <tbody id="sellTableBody" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
        </table>
    </div>

    <!-- 📝 編輯修改紀錄彈跳視窗 (Modal) -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-xl w-full max-w-md max-h-[90vh] overflow-y-auto transition-colors">
            <h2 class="text-xl font-bold mb-4 text-slate-700 dark:text-slate-200 border-b dark:border-gray-600 pb-2 flex items-center">
                <span class="mr-2">✏️</span> <span id="editModalTitle">修改紀錄</span>
            </h2>
            <form id="editForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">券商名稱</label><select id="editBroker" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white broker-dropdown" required></select></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">標的</label><input type="text" id="editSymbol" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">日期</label><input type="date" id="editDate" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">股票國家</label>
                    <select id="editCountry" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                        <option value="台股">台股</option><option value="美股">美股</option><option value="日股">日股</option><option value="韓股">韓股</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">股票類型</label>
                    <select id="editType" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                        <option value="股票">股票</option><option value="債券">債券</option><option value="高股息">高股息</option><option value="etf">etf</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300">股數</label><input type="number" id="editShares" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                <div><label class="block text-sm font-medium mb-1 dark:text-gray-300" id="editPriceLabel">成交價</label><input type="number" step="0.01" id="editPrice" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white" required></div>
                
                <div id="editBuyTotalContainer" class="col-span-1 sm:col-span-2 hidden">
                    <label class="block text-sm font-medium mb-1 dark:text-gray-300">買入總額 (成本)</label>
                    <input type="number" step="0.01" id="editBuyTotal" class="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-white">
                </div>

                <div class="col-span-1 sm:col-span-2 flex justify-end gap-3 mt-4">
                    <button type="button" onclick="closeEditModal()" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-200 rounded transition font-medium">取消返回</button>
                    <button type="submit" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded transition font-medium">確認修改</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 偵測深色模式變更並重繪圖表 ---
        const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        darkModeMediaQuery.addEventListener('change', (e) => {
            if (chartCountry) {
                chartCountry.destroy();
                chartAssetType.destroy();
                chartUnrealized.destroy();
                chartRealized.destroy();
                initCharts();
                renderCharts();
            }
        });

        function isDarkMode() {
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        // --- 資料管理區 (帶有 LocalStorage 自動儲存) ---
        let buyRecords = [];
        let sellRecords = [];
        let customBrokers = []; 
        const defaultBrokers = ["元大", "富邦", "國泰", "凱基", "群益", "永豐金"];

        function loadData() {
            buyRecords = JSON.parse(localStorage.getItem('stockTracker_buyRecords')) || [
                { id: 1, broker: "元大", symbol: "2330", date: "2026-05-10", country: "台股", type: "股票", shares: 1000, buyPrice: 800, currentPrice: 850 },
                { id: 2, broker: "富邦", symbol: "AAPL", date: "2026-01-20", country: "美股", type: "股票", shares: 50, buyPrice: 170, currentPrice: 165 },
                { id: 3, broker: "國泰", symbol: "00679B", date: "2026-03-15", country: "台股", type: "債券", shares: 2000, buyPrice: 30, currentPrice: 31 }
            ];
            sellRecords = JSON.parse(localStorage.getItem('stockTracker_sellRecords')) || [
                { id: 1, broker: "元大", symbol: "2603", date: "2026-04-05", country: "台股", type: "股票", shares: 1000, sellPrice: 180, buyTotal: 150000 }
            ];
            customBrokers = JSON.parse(localStorage.getItem('stockTracker_customBrokers')) || [];
        }

        function saveData() {
            localStorage.setItem('stockTracker_buyRecords', JSON.stringify(buyRecords));
            localStorage.setItem('stockTracker_sellRecords', JSON.stringify(sellRecords));
            localStorage.setItem('stockTracker_customBrokers', JSON.stringify(customBrokers));
        }

        let chartCountry, chartAssetType, chartUnrealized, chartRealized;
        let editingRecordId = null;
        let editingRecordType = null; 

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.remove("opacity-0", "pointer-events-none");
            toast.classList.add("opacity-100");
            setTimeout(() => {
                toast.classList.remove("opacity-100");
                toast.classList.add("opacity-0", "pointer-events-none");
            }, 3000);
        }

        // --- 初始化頁面 ---
        document.addEventListener("DOMContentLoaded", () => {
            loadData();
            initCharts();
            updateAll();

            // 自訂新券商事件
            document.querySelectorAll('.broker-dropdown').forEach(select => {
                select.addEventListener('change', function(e) {
                    if (e.target.value === 'ADD_NEW') {
                        const newBroker = prompt("請輸入自訂的券商名稱：");
                        if (newBroker && newBroker.trim() !== '') {
                            const cleanName = newBroker.trim();
                            if (!defaultBrokers.includes(cleanName) && !customBrokers.includes(cleanName)) {
                                customBrokers.push(cleanName);
                                saveData();
                            }
                            updateBrokerDropdowns();
                            e.target.value = cleanName; 
                        } else {
                            e.target.selectedIndex = 0; 
                        }
                    }
                });
            });

            document.getElementById("sortBuySelect").addEventListener("change", updateAll);
            document.getElementById("sortSellSelect").addEventListener("change", updateAll);

            // 提交買入
            document.getElementById("buyForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const record = {
                    id: Date.now(),
                    broker: document.getElementById("buyBroker").value,
                    symbol: document.getElementById("buySymbol").value.toUpperCase(),
                    date: document.getElementById("buyDate").value,
                    country: document.getElementById("buyCountry").value,
                    type: document.getElementById("buyType").value,
                    shares: parseFloat(document.getElementById("buyShares").value),
                    buyPrice: parseFloat(document.getElementById("buyPrice").value),
                    currentPrice: parseFloat(document.getElementById("buyPrice").value) 
                };
                buyRecords.push(record);
                this.reset(); saveData(); updateAll(); showToast("✅ 已成功新增庫存紀錄！");
            });

            // 提交賣出
            document.getElementById("sellForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const sellShares = parseFloat(document.getElementById("sellShares").value);
                const selectedBuyId = document.getElementById("sellLinkBuy").value;
                
                if (selectedBuyId) {
                    const buyRecord = buyRecords.find(r => r.id == selectedBuyId);
                    if (buyRecord) {
                        if (sellShares > buyRecord.shares) { 
                            showToast("❌ 賣出股數不可大於庫存股數！"); 
                            return; 
                        }
                        buyRecord.shares -= sellShares;
                    }
                }
                const record = {
                    id: Date.now(), broker: document.getElementById("sellBroker").value,
                    symbol: document.getElementById("sellSymbol").value.toUpperCase(),
                    date: document.getElementById("sellDate").value, country: document.getElementById("sellCountry").value,
                    type: document.getElementById("sellType").value, shares: sellShares,
                    sellPrice: parseFloat(document.getElementById("sellPrice").value),
                    buyTotal: parseFloat(document.getElementById("sellBuyTotal").value)
                };
                sellRecords.push(record);
                buyRecords = buyRecords.filter(r => r.shares > 0);
                this.reset();
                document.getElementById("sellShares").removeAttribute("max");
                document.getElementById("sellShares").placeholder = "";
                saveData(); updateAll(); showToast("✅ 已成功新增交易並更新庫存！");
            });

            // 提交修改
            document.getElementById("editForm").addEventListener("submit", function(e) {
                e.preventDefault();
                if (!confirm("⚠️ 確定要儲存修改後的資料嗎？")) return;
                if (editingRecordType === 'buy') {
                    const record = buyRecords.find(r => r.id === editingRecordId);
                    if (record) {
                        record.broker = document.getElementById("editBroker").value;
                        record.symbol = document.getElementById("editSymbol").value.toUpperCase();
                        record.date = document.getElementById("editDate").value;
                        record.country = document.getElementById("editCountry").value;
                        record.type = document.getElementById("editType").value;
                        record.shares = parseFloat(document.getElementById("editShares").value);
                        record.buyPrice = parseFloat(document.getElementById("editPrice").value);
                    }
                } else if (editingRecordType === 'sell') {
                    const record = sellRecords.find(r => r.id === editingRecordId);
                    if (record) {
                        record.broker = document.getElementById("editBroker").value;
                        record.symbol = document.getElementById("editSymbol").value.toUpperCase();
                        record.date = document.getElementById("editDate").value;
                        record.country = document.getElementById("editCountry").value;
                        record.type = document.getElementById("editType").value;
                        record.shares = parseFloat(document.getElementById("editShares").value);
                        record.sellPrice = parseFloat(document.getElementById("editPrice").value);
                        record.buyTotal = parseFloat(document.getElementById("editBuyTotal").value);
                    }
                }
                saveData(); updateAll(); closeEditModal(); showToast("✅ 紀錄修改成功！");
            });

            const sellSharesInput = document.getElementById("sellShares");
            const sellLinkBuySelect = document.getElementById("sellLinkBuy");
            const sellBuyTotalInput = document.getElementById("sellBuyTotal");

            function calcBuyTotal() {
                const selectedId = sellLinkBuySelect.value;
                const shares = parseFloat(sellSharesInput.value) || 0;
                if (selectedId && shares > 0) {
                    const buyRecord = buyRecords.find(r => r.id == selectedId);
                    if (buyRecord) sellBuyTotalInput.value = (shares * buyRecord.buyPrice).toFixed(2);
                }
            }
            sellSharesInput.addEventListener("input", calcBuyTotal);
            sellLinkBuySelect.addEventListener("change", () => {
                const selectedId = sellLinkBuySelect.value;
                if (selectedId) {
                    const buyRecord = buyRecords.find(r => r.id == selectedId);
                    document.getElementById("sellSymbol").value = buyRecord.symbol;
                    document.getElementById("sellCountry").value = buyRecord.country;
                    document.getElementById("sellType").value = buyRecord.type;
                    document.getElementById("sellBroker").value = buyRecord.broker;
                    sellSharesInput.max = buyRecord.shares;
                    sellSharesInput.placeholder = `最多可賣: ${buyRecord.shares}`;
                } else {
                    sellSharesInput.removeAttribute("max"); sellSharesInput.placeholder = "";
                }
                calcBuyTotal();
            });
            
            // 🚀 高成功率雙代理即時股價同步系統
            document.getElementById("refreshPricesBtn").addEventListener("click", async function() {
                const btn = this; const originalText = btn.innerHTML;
                btn.innerHTML = "⏳ 更新資料中..."; btn.disabled = true; btn.classList.add("opacity-70", "cursor-not-allowed");

                async function fetchStockData(targetUrl) {
                    try { const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`); if(res.ok) return await res.json(); } catch(e) {}
                    try { const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`); if(res.ok) return await res.json(); } catch(e) {}
                    return null;
                }

                try {
                    let updatedCount = 0; let errorCount = 0;
                    const uniqueStocks = [];
                    buyRecords.forEach(r => {
                        if (!uniqueStocks.find(s => s.symbol === r.symbol && s.country === r.country)) uniqueStocks.push({ symbol: r.symbol, country: r.country });
                    });
                    const latestPrices = {};

                    for (let stock of uniqueStocks) {
                        let baseSymbol = stock.symbol.trim();
                        let suffixesToTry = stock.country === '台股' ? ['.TW', '.TWO'] : stock.country === '日股' ? ['.T'] : stock.country === '韓股' ? ['.KS', '.KQ'] : [''];
                        let priceFound = false;
                        for (let suffix of suffixesToTry) {
                            if (priceFound) break;
                            const yfSymbol = baseSymbol + suffix;
                            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${yfSymbol}?interval=1d`;
                            const yfData = await fetchStockData(url);
                            if (yfData && yfData.chart && yfData.chart.result && yfData.chart.result.length > 0) {
                                const realPrice = yfData.chart.result[0].meta.regularMarketPrice;
                                if (realPrice) { latestPrices[`${stock.symbol}_${stock.country}`] = realPrice; priceFound = true; }
                            }
                        }
                        if (!priceFound) errorCount++;
                    }

                    buyRecords.forEach(record => {
                        const key = `${record.symbol}_${record.country}`;
                        if (latestPrices[key]) { record.currentPrice = latestPrices[key]; updatedCount++; }
                    });

                    saveData(); updateAll();
                    if (errorCount === 0 && updatedCount > 0) showToast(`✅ 成功同步 ${updatedCount} 筆最新報價。`);
                    else if (updatedCount > 0) showToast(`⚠️ 更新完畢。成功 ${updatedCount} 筆，少數抓取失敗。`);
                    else showToast(`❌ 無法取得報價，請檢查代碼。`);
                } catch (error) { showToast("❌ 網路請求發生異常。"); } 
                finally { btn.innerHTML = originalText; btn.disabled = false; btn.classList.remove("opacity-70", "cursor-not-allowed"); }
            });
        });

        // --- 功能模組區 ---
        function updateBrokerDropdowns() {
            const allBrokers = [...new Set([...defaultBrokers, ...customBrokers])];
            let optionsHTML = '<option value="" disabled selected>-- 請選擇券商 --</option>';
            allBrokers.forEach(b => { optionsHTML += `<option value="${b}">${b}</option>`; });
            optionsHTML += '<option value="ADD_NEW" class="font-bold text-blue-500">➕ 新增自訂券商...</option>';

            document.querySelectorAll('.broker-dropdown').forEach(select => {
                const currentVal = select.value;
                select.innerHTML = optionsHTML;
                if (currentVal && currentVal !== 'ADD_NEW') select.value = currentVal;
            });
        }

        function updateCurrentPrice(id, newPrice) {
            const record = buyRecords.find(r => r.id === id);
            if (record) { record.currentPrice = parseFloat(newPrice) || 0; saveData(); updateAll(); }
        }

        function deleteRecord(type, id) {
            if (confirm("⚠️ 確定要刪除這筆紀錄嗎？刪除後無法復原。")) {
                if (type === 'buy') buyRecords = buyRecords.filter(r => r.id !== id);
                else if (type === 'sell') sellRecords = sellRecords.filter(r => r.id !== id);
                saveData(); updateAll(); showToast("🗑️ 紀錄已刪除！");
            }
        }

        function openEditModal(type, id) {
            editingRecordType = type; editingRecordId = id;
            const modal = document.getElementById('editModal');
            let record;

            if (type === 'buy') {
                record = buyRecords.find(r => r.id === id);
                document.getElementById('editModalTitle').textContent = '修改庫存紀錄';
                document.getElementById('editPriceLabel').textContent = '買入成交價';
                document.getElementById('editBuyTotalContainer').classList.add('hidden');
                document.getElementById('editBuyTotal').removeAttribute('required');
            } else {
                record = sellRecords.find(r => r.id === id);
                document.getElementById('editModalTitle').textContent = '修改已實現紀錄';
                document.getElementById('editPriceLabel').textContent = '賣出成交價';
                document.getElementById('editBuyTotalContainer').classList.remove('hidden');
                document.getElementById('editBuyTotal').setAttribute('required', 'required');
                document.getElementById('editBuyTotal').value = record.buyTotal;
            }

            if(record) {
                document.getElementById('editBroker').value = record.broker;
                document.getElementById('editSymbol').value = record.symbol;
                document.getElementById('editDate').value = record.date;
                document.getElementById('editCountry').value = record.country;
                document.getElementById('editType').value = record.type;
                document.getElementById('editShares').value = record.shares;
                document.getElementById('editPrice').value = type === 'buy' ? record.buyPrice : record.sellPrice;
                modal.classList.remove('hidden');
            }
        }

        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); editingRecordId = null; editingRecordType = null; }

        function updateAll() { updateBrokerDropdowns(); renderTables(); updateDropdowns(); renderCharts(); }

        function updateDropdowns() {
            const select = document.getElementById("sellLinkBuy");
            select.innerHTML = '<option value="">-- 不代入，手動填寫買入總金額 --</option>';
            buyRecords.forEach(r => {
                const opt = document.createElement("option");
                opt.value = r.id; opt.textContent = `${r.broker} - ${r.symbol} (餘 ${r.shares} 股, 成本價: ${r.buyPrice})`;
                select.appendChild(opt);
            });
        }

        function renderTables() {
            const buyTbody = document.getElementById("buyTableBody");
            const sellTbody = document.getElementById("sellTableBody");
            buyTbody.innerHTML = ""; sellTbody.innerHTML = "";

            const buySortMode = document.getElementById("sortBuySelect").value;
            let sortedBuyRecords = [...buyRecords];
            if(buySortMode === 'broker') sortedBuyRecords.sort((a, b) => a.broker.localeCompare(b.broker));
            else if(buySortMode === 'date') sortedBuyRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            else if(buySortMode === 'country') sortedBuyRecords.sort((a, b) => a.country.localeCompare(b.country));
            else if(buySortMode === 'type') sortedBuyRecords.sort((a, b) => a.type.localeCompare(b.type));

            const sellSortMode = document.getElementById("sortSellSelect").value;
            let sortedSellRecords = [...sellRecords];
            if(sellSortMode === 'broker') sortedSellRecords.sort((a, b) => a.broker.localeCompare(b.broker));
            else if(sellSortMode === 'date') sortedSellRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            else if(sellSortMode === 'country') sortedSellRecords.sort((a, b) => a.country.localeCompare(b.country));
            else if(sellSortMode === 'type') sortedSellRecords.sort((a, b) => a.type.localeCompare(b.type));

            sortedBuyRecords.forEach(r => {
                const buyTotal = r.shares * r.buyPrice; const currentTotal = r.shares * r.currentPrice;
                const pl = currentTotal - buyTotal;
                const plClass = pl >= 0 ? "text-profit" : "text-loss"; const plSign = pl >= 0 ? "+" : "";

                buyTbody.innerHTML += `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
                        <td class="p-3 border-b dark:border-gray-700">${r.broker}</td>
                        <td class="p-3 border-b dark:border-gray-700 font-bold">${r.symbol}</td>
                        <td class="p-3 border-b dark:border-gray-700">${r.country}</td>
                        <td class="p-3 border-b dark:border-gray-700">${r.type}</td>
                        <td class="p-3 border-b dark:border-gray-700">${r.date}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">${r.shares}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">$${r.buyPrice.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">$${buyTotal.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">
                            <input type="number" step="0.01" class="border dark:border-gray-600 rounded p-1 w-24 text-right bg-blue-50 dark:bg-gray-600 dark:text-white" 
                                   value="${r.currentPrice}" onchange="updateCurrentPrice(${r.id}, this.value)">
                        </td>
                        <td class="p-3 border-b dark:border-gray-700 text-right ${plClass}">${plSign}$${pl.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-center space-x-1 whitespace-nowrap">
                            <button onclick="openEditModal('buy', ${r.id})" class="bg-blue-50 dark:bg-gray-700 text-blue-500 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-gray-600 px-3 py-1 rounded transition text-sm border border-blue-100 dark:border-gray-600 shadow-sm">修改</button>
                            <button onclick="deleteRecord('buy', ${r.id})" class="bg-red-50 dark:bg-gray-700 text-red-500 dark:text-red-400 hover:bg-red-100 dark:hover:bg-gray-600 px-3 py-1 rounded transition text-sm border border-red-100 dark:border-gray-600 shadow-sm">刪除</button>
                        </td>
                    </tr>
                `;
            });

            sortedSellRecords.forEach(r => {
                const sellTotal = r.shares * r.sellPrice; const pl = sellTotal - r.buyTotal;
                const plClass = pl >= 0 ? "text-profit" : "text-loss"; const plSign = pl >= 0 ? "+" : "";

                sellTbody.innerHTML += `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
                        <td class="p-3 border-b dark:border-gray-700">${r.broker}</td>
                        <td class="p-3 border-b dark:border-gray-700 font-bold">${r.symbol}</td>
                        <td class="p-3 border-b dark:border-gray-700">${r.country}</td>
                        <td class="p-3 border-b dark:border-gray-700">${r.type}</td>
                        <td class="p-3 border-b dark:border-gray-700">${r.date}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">${r.shares}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">$${r.sellPrice.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">$${sellTotal.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right">$${r.buyTotal.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-right ${plClass}">${plSign}$${pl.toFixed(2)}</td>
                        <td class="p-3 border-b dark:border-gray-700 text-center space-x-1 whitespace-nowrap">
                            <button onclick="openEditModal('sell', ${r.id})" class="bg-blue-50 dark:bg-gray-700 text-blue-500 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-gray-600 px-3 py-1 rounded transition text-sm border border-blue-100 dark:border-gray-600 shadow-sm">修改</button>
                            <button onclick="deleteRecord('sell', ${r.id})" class="bg-red-50 dark:bg-gray-700 text-red-500 dark:text-red-400 hover:bg-red-100 dark:hover:bg-gray-600 px-3 py-1 rounded transition text-sm border border-red-100 dark:border-gray-600 shadow-sm">刪除</button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- 圖表中央文字自訂外掛 ---
        const centerTextPlugin = {
            id: 'centerText',
            beforeDraw: function(chart) {
                if (chart.config.type !== 'doughnut') return;
                let ctx = chart.ctx; let chartArea = chart.chartArea;
                if (!chartArea) return; 

                let centerX = (chartArea.left + chartArea.right) / 2;
                let centerY = (chartArea.top + chartArea.bottom) / 2;
                ctx.restore();
                let areaHeight = chartArea.bottom - chartArea.top;
                let fontSize = (areaHeight / 140).toFixed(2);
                ctx.font = "bold " + fontSize + "em sans-serif";
                ctx.textBaseline = "middle"; ctx.textAlign = "center";
                
                // 動態切換圖表中央總額的文字顏色
                ctx.fillStyle = isDarkMode() ? "#f1f5f9" : "#475569"; 

                let total = 0;
                if (chart.customNetTotal !== undefined) total = chart.customNetTotal;
                else if(chart.data.datasets.length > 0 && chart.data.datasets[0].data.length > 0) {
                    total = chart.data.datasets[0].data.reduce((a, b) => a + (b || 0), 0);
                }
                
                let totalPrefix = total < 0 ? "-" : "";
                let text = totalPrefix + "$" + Math.abs(total).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                ctx.fillText(text, centerX, centerY - 10);

                ctx.font = "normal " + (fontSize * 0.45).toFixed(2) + "em sans-serif";
                ctx.fillStyle = "#94a3b8";
                let subtitle = chart.customSubtitle || "金額總計";
                ctx.fillText(subtitle, centerX, centerY + 18);
                ctx.save();
            }
        };

        Chart.register(ChartDataLabels); 
        Chart.register(centerTextPlugin);

        // 🎨 取得圖表設定項目 (統一設定無邊框：borderWidth: 0)
        function getPieOptions() {
            return {
                responsive: true, maintainAspectRatio: false, cutout: '75%', 
                plugins: { 
                    legend: { 
                        position: 'bottom', 
                        labels: { 
                            boxWidth: 12,
                            color: isDarkMode() ? '#e2e8f0' : '#475569', 
                            generateLabels: function(chart) {
                                const data = chart.data;
                                if (data.labels.length && data.datasets.length) {
                                    return data.labels.map((label, i) => {
                                        const meta = chart.getDatasetMeta(0); const style = meta.controller.getStyle(i);
                                        const value = data.datasets[0].data[i] || 0;
                                        const total = data.datasets[0].data.reduce((a, b) => a + (b || 0), 0);
                                        const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                        return {
                                            text: `${label} (${percentage}%)`,
                                            fillStyle: style.backgroundColor, strokeStyle: style.borderColor,
                                            lineWidth: style.borderWidth, hidden: isNaN(value) || meta.data[i].hidden, index: i
                                        };
                                    });
                                } return [];
                            }
                        } 
                    },
                    datalabels: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const value = context.raw;
                                const total = context.dataset.data.reduce((a, b) => a + (b || 0), 0);
                                const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                return ` ${context.label}: $${value.toLocaleString()} (${percentage}%)`;
                            }
                        }
                    }
                } 
            };
        }

        function initCharts() {
            chartCountry = new Chart(document.getElementById('chartCountry'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [] }] }, options: getPieOptions() });
            chartAssetType = new Chart(document.getElementById('chartAssetType'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [] }] }, options: getPieOptions() });
            chartUnrealized = new Chart(document.getElementById('chartUnrealized'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [] }] }, options: getPieOptions() });
            chartRealized = new Chart(document.getElementById('chartRealized'), { type: 'doughnut', data: { labels: [], datasets: [{ data: [] }] }, options: getPieOptions() });
        }

        function renderCharts() {
            const morandiPalette1 = ['#a0aab2', '#d5cabc', '#c8b4a2', '#97a69b']; 
            const morandiPalette2 = ['#b8a89f', '#96a198', '#d0d4cc', '#a69993']; 
            const brokerPalette = ['#8a9a9a', '#c4b7a6', '#b39d9b', '#9eafb5', '#d0c4b7', '#a6b4a1', '#c9a9a9', '#8b98a8', '#b8b2a6', '#a39b98'];
            let brokerColorMap = {}; let brokerColorIndex = 0;
            
            function getBrokerColor(brokerName) {
                if (!brokerColorMap[brokerName]) {
                    brokerColorMap[brokerName] = brokerPalette[brokerColorIndex % brokerPalette.length];
                    brokerColorIndex++;
                } return brokerColorMap[brokerName];
            }

            let countryData = { "台股": 0, "美股": 0, "日股": 0, "韓股": 0 };
            let typeData = { "股票": 0, "債券": 0, "高股息": 0, "etf": 0 };
            let unrealizedByBroker = {}; 

            buyRecords.forEach(r => {
                const currentTotal = r.shares * r.currentPrice;
                const pl = currentTotal - (r.shares * r.buyPrice);
                if (countryData[r.country] !== undefined) countryData[r.country] += currentTotal;
                if (typeData[r.type] !== undefined) typeData[r.type] += currentTotal;
                if (!unrealizedByBroker[r.broker]) unrealizedByBroker[r.broker] = 0;
                unrealizedByBroker[r.broker] += pl;
            });

            updatePieChart(chartCountry, countryData, morandiPalette1);
            updatePieChart(chartAssetType, typeData, morandiPalette2);
            chartCountry.customSubtitle = "市值總額"; chartAssetType.customSubtitle = "市值總額";

            // 浮動盈虧圓餅圖
            let unrealizedLabels = [], unrealizedVals = [], unrealizedColors = []; let netUnrealized = 0; 
            for (let broker in unrealizedByBroker) {
                let val = unrealizedByBroker[broker]; netUnrealized += val; 
                if (val !== 0) {
                    unrealizedLabels.push(`${broker} (${val > 0 ? '盈' : '虧'})`);
                    unrealizedVals.push(Math.abs(val)); unrealizedColors.push(getBrokerColor(broker)); 
                }
            }
            chartUnrealized.data.labels = unrealizedLabels;
            chartUnrealized.data.datasets[0] = { data: unrealizedVals, backgroundColor: unrealizedColors, borderWidth: 0 }; // 👈 設定 borderWidth: 0 去除外框
            chartUnrealized.customNetTotal = netUnrealized; chartUnrealized.customSubtitle = "淨未實現"; chartUnrealized.update();

            // 已實現損益圓餅圖
            let realizedByBroker = {};
            sellRecords.forEach(r => {
                const pl = (r.shares * r.sellPrice) - r.buyTotal;
                if (!realizedByBroker[r.broker]) realizedByBroker[r.broker] = 0;
                realizedByBroker[r.broker] += pl;
            });

            let realizedLabels = [], realizedVals = [], realizedColors = []; let netRealized = 0; 
            for (let broker in realizedByBroker) {
                let val = realizedByBroker[broker]; netRealized += val;
                if (val !== 0) {
                    realizedLabels.push(`${broker} (${val > 0 ? '盈' : '虧'})`);
                    realizedVals.push(Math.abs(val)); realizedColors.push(getBrokerColor(broker)); 
                }
            }
            chartRealized.data.labels = realizedLabels;
            chartRealized.data.datasets[0] = { data: realizedVals, backgroundColor: realizedColors, borderWidth: 0 }; // 👈 設定 borderWidth: 0 去除外框
            chartRealized.customNetTotal = netRealized; chartRealized.customSubtitle = "淨已實現"; chartRealized.update();
        }

        function updatePieChart(chartObj, dataObj, colors) {
            chartObj.data.labels = Object.keys(dataObj);
            chartObj.data.datasets[0] = { 
                data: Object.values(dataObj), 
                backgroundColor: colors, 
                borderWidth: 0 // 👈 設定 borderWidth: 0 去除外框
            };
            chartObj.update();
        }
    </script>
</body>
</html>
